<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black background -->
  <rect width="32" height="32" rx="4" fill="#000000"/>
  
  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#27272a" stroke-width="1"/>
  
  <!-- Neural node / circuit dot pattern (subtle background texture) -->
  <circle cx="8" cy="8" r="1.5" fill="#3f3f46"/>
  <circle cx="24" cy="8" r="1.5" fill="#3f3f46"/>
  <circle cx="8" cy="24" r="1.5" fill="#3f3f46"/>
  <circle cx="24" cy="24" r="1.5" fill="#3f3f46"/>
  <circle cx="16" cy="16" r="1.5" fill="#3f3f46"/>
  
  <!-- Connection lines between nodes (subtle) -->
  <line x1="8" y1="8" x2="16" y2="16" stroke="#3f3f46" stroke-width="0.75"/>
  <line x1="24" y1="8" x2="16" y2="16" stroke="#3f3f46" stroke-width="0.75"/>
  <line x1="8" y1="24" x2="16" y2="16" stroke="#3f3f46" stroke-width="0.75"/>
  <line x1="24" y1="24" x2="16" y2="16" stroke="#3f3f46" stroke-width="0.75"/>
  
  <!-- Bold "N" letter -->
  <!-- Left vertical stroke -->
  <rect x="8" y="8" width="3.5" height="16" rx="0.5" fill="#ffffff"/>
  
  <!-- Diagonal stroke (center) -->
  <polygon points="8,24 11.5,24 23.5,8 20,8" fill="#ffffff"/>
  
  <!-- Right vertical stroke -->
  <rect x="20" y="8" width="3.5" height="16" rx="0.5" fill="#ffffff"/>
  
  <!-- Active node (glow effect on the diagonal intersection) -->
  <circle cx="16" cy="16" r="2" fill="#ffffff"/>
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
</svg>